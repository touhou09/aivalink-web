appId: com.aivalink.app
productName: AivaLink
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - '!node_modules/**/*'
mac:
  target:
    - dmg
    - zip
  artifactName: '${productName}-${version}-${arch}.${ext}'
win:
  target:
    - nsis
  artifactName: '${productName}-${version}-setup.${ext}'
linux:
  target:
    - AppImage
  artifactName: '${productName}-${version}.${ext}'
